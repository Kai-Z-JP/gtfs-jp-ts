name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Sync package versions
        run: node scripts/sync-versions.mjs

      - name: Resolve npm dist-tag
        id: npm_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          [[ "$VERSION" =~ -([a-z]+) ]] && TAG="${BASH_REMATCH[1]}" || TAG="latest"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Publish @gtfs-jp/types
        run: pnpm --filter @gtfs-jp/types publish --no-git-checks --tag ${{ steps.npm_tag.outputs.tag }} --provenance

      - name: Wait for npm propagation
        run: sleep 10

      - name: Publish @gtfs-jp/loader
        run: pnpm --filter @gtfs-jp/loader publish --no-git-checks --tag ${{ steps.npm_tag.outputs.tag }} --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
