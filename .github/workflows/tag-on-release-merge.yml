name: Tag On Release Merge

on:
  push:
    branches:
      - main
      - beta

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}

    steps:
      - name: Verify release token
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TOKEN}" ]; then
            echo "RELEASE_PR_TOKEN is required so tag pushes can trigger downstream workflows."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ env.RELEASE_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Detect version change
        id: version
        run: |
          set -euo pipefail
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          BEFORE_SHA="${{ github.event.before }}"

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            PREVIOUS_VERSION=""
          else
            PREVIOUS_VERSION=$(git show "$BEFORE_SHA:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          fi

          if [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse "v$CURRENT_VERSION" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.version.outputs.changed == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Back-merge beta into develop
        if: steps.version.outputs.changed == 'true' && github.ref_name == 'beta'
        run: |
          set -euo pipefail
          git fetch origin develop beta
          git switch -C develop-sync origin/develop
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-edit origin/beta
          git push origin HEAD:develop
